# Configuration cargo-deny pour xsshend
# https://embarkstudios.github.io/cargo-deny/

[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unlicense",
    "0BSD",
    "OpenSSL",
    "MPL-2.0",
    "CC0-1.0",
    "Unicode-3.0",
]

confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"

# Interdire l'ajout direct du crate rsa comme dépendance directe de xsshend.
# (Il reste autorisé comme dépendance transitive de russh.)
[[bans.deny]]
name = "ring"
reason = "Préférer aws-lc-rs (constant-time, FIPS-eligible). Voir Cargo.toml."

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
