# Configuration cargo-deny pour xsshend
# https://embarkstudios.github.io/cargo-deny/

[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]

# ── Analyse RUSTSEC-2023-0071 (Marvin Attack / rsa crate) ──────────
#
# STATUS v0.6.0 : PARTIELLEMENT MITIGÉ
#
# Le crate `rsa 0.9.8` reste dans le graphe de dépendances via :
#   russh → internal-russh-forked-ssh-key → rsa
# Il est utilisé UNIQUEMENT pour le parsing/sérialisation des clés RSA.
#
# MITIGATION PRINCIPALE (v0.6.0) :
#   russh = { features = ["aws-lc-rs"] } est maintenant explicite.
#   Les opérations cryptographiques SSH (signatures, échanges de clés)
#   passent par aws-lc-rs qui implémente RSA en constant-time.
#   → L'attaque Marvin requiert d'observer le timing des opérations
#     de signature/déchiffrement. Celles-ci se font via aws-lc-rs, non rsa.
#
# RISQUE RÉSIDUEL :
#   Si une clé RSA privée est chargée depuis le disque, `internal-russh-forked-ssh-key`
#   utilise `rsa` pour le parsing. Selon le chemin de code, rsa::decrypt()
#   pourrait être appelé lors du déchiffrement de la clé (passphrase).
#   Ce chemin est local (pas réseau) → risque d'exploitation très faible.
#
# RECOMMANDATION :
#   Utiliser des clés Ed25519 (non affectées, aucun appel à rsa::*).
#   ssh-keygen -t ed25519 -C "votre@email.com"
#
# SUIVI UPSTREAM : https://github.com/Eugeny/russh/issues/337
#
[[advisories.ignore]]
id = "RUSTSEC-2023-0071"
reason = """
Partiellement mitigé en v0.6.0 via features = ['aws-lc-rs'] sur russh.
Les opérations SSH crypto utilisent aws-lc-rs (constant-time).
Risque résiduel : parsing de clés RSA locales via internal-russh-forked-ssh-key.
Mitigation : utiliser des clés Ed25519 (recommandé et documenté).
Suivi : https://github.com/Eugeny/russh/issues/337
"""

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unlicense",
    "0BSD",
    "OpenSSL",
    "MPL-2.0",
    "CC0-1.0",
    "Unicode-3.0",
]

confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"

# Interdire l'ajout direct du crate rsa comme dépendance directe de xsshend.
# (Il reste autorisé comme dépendance transitive de russh.)
[[bans.deny]]
name = "ring"
reason = "Préférer aws-lc-rs (constant-time, FIPS-eligible). Voir Cargo.toml."

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
