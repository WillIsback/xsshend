# Lock file pour agent-pr-review.md
name: "🤖 Agent — PR Stability Review"

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: read
  id-token: write

jobs:
  review:
    name: PR stability review
    runs-on: ubuntu-latest
    # Ne pas tourner sur les PRs du bot lui-même
    if: ${{ !contains(github.event.pull_request.user.login, 'bot') }}
    timeout-minutes: 10

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch for diff
        run: git fetch origin main

      - name: Generate diff summary
        id: diff
        run: |
          DIFF=$(git diff origin/main...HEAD --stat | head -30)
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # Lire version depuis Cargo.toml (source unique — main.rs utilise env!("CARGO_PKG_VERSION"))
          CARGO_VER=$(grep '^version' Cargo.toml | head -1 | grep -oP '"\K[^"]+')
          echo "cargo_ver=${CARGO_VER}" >> $GITHUB_OUTPUT

      - name: Run Claude Code review agent
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: "claude-sonnet-4-5"
          timeout_minutes: 8
          direct_prompt: |
            You are the xsshend PR stability bot.

            ## PR info
            - Title: ${{ github.event.pull_request.title }}
            - Author: ${{ github.event.pull_request.user.login }}
            - Branch: ${{ github.event.pull_request.head.ref }} → main
            - Diff stat: ${{ steps.diff.outputs.diff }}
            - Cargo.toml version: ${{ steps.diff.outputs.cargo_ver }} (single source of truth — main.rs uses env!("CARGO_PKG_VERSION"))

            ## Your task (from agent-pr-review.md)
            Check: version bump consistency, CHANGELOG entry, new dependencies,
            breaking changes, test coverage for new modules, build deps in CI (cmake/clang for aws-lc-rs),
            doc comments on public items.

            Read the relevant changed files, then post a concise review comment (max 20 lines):
            - ✅/❌ for each check
            - Overall: READY TO MERGE or NEEDS CHANGES
            - If NEEDS CHANGES: specific action items

            Do NOT use GitHub review approval/rejection — comment only.
          allowed_tools: "Read,Bash,mcp__github__create_pull_request_review_comment,mcp__github__create_issue_comment"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
