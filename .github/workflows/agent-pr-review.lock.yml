# Lock file pour agent-pr-review.md
name: "🤖 Agent — PR Stability Review"

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: PR stability review
    runs-on: ubuntu-latest
    # Ne pas tourner sur les PRs du bot lui-même
    if: ${{ !contains(github.event.pull_request.user.login, 'bot') }}
    timeout-minutes: 10

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Copilot code review
        uses: github/copilot-code-review@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          instructions: |
            You are reviewing a PR for xsshend, a Rust SSH file-upload CLI tool.
            The version in Cargo.toml is the single source of truth (main.rs uses env!("CARGO_PKG_VERSION")).

            Check each of the following and report ✅ or ❌:
            - Version bump: Cargo.toml version was bumped and matches a new CHANGELOG entry
            - CHANGELOG: a new entry exists for this change
            - New dependencies: any new crate in Cargo.toml is justified and has no obvious security issues
            - Breaking changes: if the public CLI interface changed, it is documented
            - Test coverage: new modules or significant new logic have accompanying tests
            - CI build deps: if aws-lc-rs or similar native deps were added, cmake/clang are installed in CI
            - Doc comments: public functions and structs have /// doc comments

            End with a one-line verdict: READY TO MERGE or NEEDS CHANGES.
            If NEEDS CHANGES, list the specific action items required.
