# Lock file pour agent-pr-review.md
name: "🤖 Agent — PR Stability Review"

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: PR stability review
    runs-on: ubuntu-latest
    # Ne pas tourner sur les PRs du bot lui-même
    if: ${{ !contains(github.event.pull_request.user.login, 'bot') }}
    timeout-minutes: 10

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch for diff
        run: git fetch origin main

      - name: Run stability checks and post review comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { execSync } = require('child_process');

            // ── helpers ──────────────────────────────────────────────────────
            const run = (cmd) => { try { return execSync(cmd, { encoding: 'utf8' }); } catch { return ''; } };
            const check = (ok, label) => `${ok ? '✅' : '❌'} ${label}`;

            // ── gather data ──────────────────────────────────────────────────
            const changedFiles = run('git diff --name-only origin/main...HEAD').trim().split('\n').filter(Boolean);
            const diffStat     = run('git diff origin/main...HEAD --stat | head -30').trim();
            const cargoToml    = run('cat Cargo.toml');
            const cargoVer     = (cargoToml.match(/^version\s*=\s*"([^"]+)"/m) || [])[1] || 'unknown';
            const changelog    = run('cat CHANGELOG.md 2>/dev/null || cat CHANGES.md 2>/dev/null || echo ""');
            const diffText     = run('git diff origin/main...HEAD -- Cargo.toml');

            // ── checks ───────────────────────────────────────────────────────
            // 1. Version bump: Cargo.toml was modified and contains a version line change
            const cargoChanged  = changedFiles.includes('Cargo.toml');
            const verBumpInDiff = /^\+version\s*=/m.test(diffText);
            const versionBump   = cargoChanged && verBumpInDiff;

            // 2. CHANGELOG entry matches the current version
            const changelogEntry = changelog.includes(cargoVer);

            // 3. New crates in Cargo.toml
            const newDeps = run('git diff origin/main...HEAD -- Cargo.toml')
              .split('\n').filter(l => l.startsWith('+') && !l.startsWith('+++') && /^\+[a-z_-]/.test(l));
            const depsOk = true; // flag only — reviewer must assess security manually

            // 4. Breaking changes: look for changed CLI structs/enums in src/main.rs or src/cli.rs
            const cliFiles   = ['src/main.rs', 'src/cli.rs', 'src/config/mod.rs'];
            const cliChanged = changedFiles.some(f => cliFiles.includes(f));
            const cliBreaking = !cliChanged; // no CLI files changed → no breaking changes

            // 5. Test coverage: new .rs files have a corresponding test or tests/ entry
            const newRsFiles  = changedFiles.filter(f => f.endsWith('.rs') && !f.startsWith('tests/'));
            const testFiles   = changedFiles.filter(f => f.startsWith('tests/') || f.includes('_test') || f.includes('test_'));
            const testCovOk   = newRsFiles.length === 0 || testFiles.length > 0;

            // 6. CI cmake/clang: if aws-lc-rs added, CI workflow must install them
            const awsLcAdded  = diffText.includes('aws-lc-rs');
            const ciFiles     = changedFiles.filter(f => f.startsWith('.github/workflows/'));
            const ciDepsOk    = !awsLcAdded || ciFiles.some(f =>
              run(`cat ${f}`).includes('cmake') || run(`cat ${f}`).includes('clang'));

            // 7. Doc comments: changed public items have at least some /// in the diff
            const pubDiff    = run('git diff origin/main...HEAD -- "src/*.rs" "src/**/*.rs"');
            const pubAdded   = /^\+pub (fn|struct|enum|trait)/.test(pubDiff);
            const docPresent = !pubAdded || /^\+\s*\/\/\//.test(pubDiff);

            // ── summary ───────────────────────────────────────────────────────
            const allOk = versionBump && changelogEntry && cliBreaking && testCovOk && ciDepsOk && docPresent;

            const newDepsList = newDeps.length
              ? `\n  New crates detected (manual security review advised):\n${newDeps.map(d => `  \`${d.slice(1).trim()}\``).join('\n')}`
              : '';

            const body = [
              `## 🤖 PR Stability Review — \`${context.payload.pull_request.head.ref}\` → \`main\``,
              '',
              `**Cargo.toml version:** \`${cargoVer}\``,
              '',
              '| Check | Result |',
              '|-------|--------|',
              `| Version bump (Cargo.toml) | ${check(versionBump, versionBump ? 'bumped' : 'not bumped — update \`version\` in Cargo.toml')} |`,
              `| CHANGELOG entry for \`${cargoVer}\` | ${check(changelogEntry, changelogEntry ? 'present' : 'missing — add entry to CHANGELOG.md')} |`,
              `| New dependencies | ${check(depsOk, newDeps.length ? `${newDeps.length} new crate(s) added${newDepsList}` : 'none added')} |`,
              `| Breaking CLI changes documented | ${check(cliBreaking, cliBreaking ? 'no CLI files changed' : 'CLI changed — verify docs/CHANGELOG')} |`,
              `| Test coverage for new modules | ${check(testCovOk, testCovOk ? 'ok' : 'new .rs files with no accompanying tests')} |`,
              `| CI build deps (cmake/clang) | ${check(ciDepsOk, ciDepsOk ? 'ok' : 'aws-lc-rs added but cmake/clang not found in CI workflow')} |`,
              `| Doc comments on public items | ${check(docPresent, docPresent ? 'ok' : 'new \`pub\` items missing \`///\` doc comments')} |`,
              '',
              diffStat ? `<details><summary>Diff stat</summary>\n\n\`\`\`\n${diffStat}\n\`\`\`\n</details>` : '',
              '',
              allOk
                ? '### ✅ READY TO MERGE'
                : '### ❌ NEEDS CHANGES\n\nAddress the ❌ items above before merging.',
            ].join('\n');

            // Post (or update) the review comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });
            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' && c.body.startsWith('## 🤖 PR Stability Review'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
            }
