# Lock file généré pour agent-ci-fix.md
# Format: GitHub Agentic Workflows (technical preview)
# Référence: https://github.github.com/gh-aw/introduction/how-they-work/
#
# Ce fichier est le workflow GitHub Actions exécutable correspondant à agent-ci-fix.md.
# Il orchestre l'exécution du coding agent (Claude Code) avec les permissions et
# safe-outputs définis dans le frontmatter du fichier .md parent.

name: "🤖 Agent — CI Failure Investigation & Auto-Fix"

on:
  workflow_run:
    workflows: ["Pre-commit Quality Gate", "Tests and Quality Checks"]
    types: [completed]
    branches-ignore: [main, gh-pages]

permissions:
  contents: read
  issues: write
  pull-requests: write
  checks: read
  actions: read

jobs:
  investigate-and-fix:
    name: Investigate CI failure
    runs-on: ubuntu-latest
    # Ne tourner que si le workflow upstream a échoué
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Download workflow logs
        uses: actions/github-script@v7
        id: get-logs
        with:
          script: |
            const run_id = context.payload.workflow_run.id;

            // Récupérer les jobs du run échoué
            const { data: jobs } = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: run_id
            });

            const failedJobs = jobs.jobs.filter(j => j.conclusion === 'failure');
            console.log(`Failed jobs: ${failedJobs.map(j => j.name).join(', ')}`);

            // Récupérer les logs de chaque job échoué
            let allLogs = '';
            for (const job of failedJobs.slice(0, 3)) { // Max 3 jobs
              try {
                const { data: logs } = await github.rest.actions.downloadJobLogsForWorkflowRun({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  job_id: job.id
                });
                allLogs += `\n=== JOB: ${job.name} ===\n${logs.substring(0, 8000)}\n`;
              } catch(e) {
                allLogs += `\n=== JOB: ${job.name} === (logs unavailable: ${e.message})\n`;
              }
            }

            const fs = require('fs');
            fs.writeFileSync('/tmp/ci-failure-logs.txt', allLogs);
            core.setOutput('failed_jobs', failedJobs.map(j => j.name).join(', '));
            core.setOutput('run_url', context.payload.workflow_run.html_url);
            core.setOutput('branch', context.payload.workflow_run.head_branch);
            core.setOutput('sha', context.payload.workflow_run.head_sha);

      - name: Run Claude Code agent analysis
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: "claude-sonnet-4-5"
          timeout_minutes: 15
          direct_prompt: |
            You are the xsshend CI bot. A CI pipeline just failed.

            ## Failed workflow info
            - Branch: ${{ steps.get-logs.outputs.branch }}
            - SHA: ${{ steps.get-logs.outputs.sha }}
            - Failed jobs: ${{ steps.get-logs.outputs.failed_jobs }}
            - Run URL: ${{ steps.get-logs.outputs.run_url }}

            ## CI failure logs
            ```
            $(cat /tmp/ci-failure-logs.txt)
            ```

            ## Your task (from agent-ci-fix.md)
            1. Analyse the logs and identify the root cause
            2. Classify: minor/auto-fixable vs significant
            3. For minor issues: create a PR with the fix (branch: bot/autofix-*)
            4. For significant issues: create a GitHub issue with full analysis
            5. For flaky tests: leave a comment on the PR, no issue needed
            6. NEVER push to main, NEVER merge PRs

            ## Project context (xsshend v0.6.0 Rust CLI)
            - Uses russh with features = ["aws-lc-rs"] → requires cmake+clang to build
            - New modules: ssh/pool.rs (ConnectionPool), core/grep.rs (GrepExecutor)
            - Key dependencies: dashmap, tokio, russh, russh-sftp, clap
          allowed_tools: "Bash,Read,Write,Edit,mcp__github__create_issue,mcp__github__create_pull_request,mcp__github__create_issue_comment,mcp__github__push_files"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
