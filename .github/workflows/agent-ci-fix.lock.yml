name: "🤖 Agent — CI Failure Investigation"

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches-ignore: [main, gh-pages]

permissions:
  contents: write
  issues: write
  pull-requests: write
  checks: read
  actions: read

jobs:
  investigate:
    name: Investigate CI failure
    runs-on: ubuntu-latest
    # Ne tourner que si le workflow CI a échoué
    # ET que ce n'est PAS un commit auto-fix (évite la boucle infinie)
    if: |
      github.event.workflow_run.conclusion == 'failure' &&
      !contains(github.event.workflow_run.head_commit.message, '[skip agent]')
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: System deps (aws-lc-rs)
        run: sudo apt-get update -q && sudo apt-get install -y cmake clang nasm

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Récupérer les logs du job échoué
        uses: actions/github-script@v7
        id: get-logs
        with:
          script: |
            const run_id = context.payload.workflow_run.id;
            const { data: jobs } = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id
            });

            const failed = jobs.jobs.filter(j => j.conclusion === 'failure');
            let logs = '';
            for (const job of failed.slice(0, 3)) {
              try {
                const { data } = await github.rest.actions.downloadJobLogsForWorkflowRun({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  job_id: job.id
                });
                logs += `\n=== JOB: ${job.name} ===\n${data.substring(0, 10000)}\n`;
              } catch(e) {
                logs += `\n=== JOB: ${job.name} === (logs indisponibles: ${e.message})\n`;
              }
            }

            require('fs').writeFileSync('/tmp/ci-failure-logs.txt', logs);
            core.setOutput('failed_jobs', failed.map(j => j.name).join(', '));
            core.setOutput('run_url', context.payload.workflow_run.html_url);
            core.setOutput('branch', context.payload.workflow_run.head_branch);
            core.setOutput('sha', context.payload.workflow_run.head_sha);

      - name: 🤖 Claude Code — Analyse + auto-fix
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: "claude-sonnet-4-5"
          timeout_minutes: 15
          direct_prompt: |
            Tu es le bot CI de xsshend (Rust CLI, v0.6.0).
            Le pipeline CI vient d'échouer sur la branche : ${{ steps.get-logs.outputs.branch }}
            SHA : ${{ steps.get-logs.outputs.sha }}
            Jobs échoués : ${{ steps.get-logs.outputs.failed_jobs }}
            URL run : ${{ steps.get-logs.outputs.run_url }}

            NOTE IMPORTANTE : les erreurs cargo fmt et cargo clippy sont déjà
            gérées automatiquement par le job auto-fix du CI (sans toi). Si les logs
            ne montrent QUE des erreurs fmt/clippy, ne fais rien — elles seront
            corrigées au prochain push.

            ## Logs d'échec
            ```
            $(cat /tmp/ci-failure-logs.txt 2>/dev/null || echo "logs unavailable")
            ```

            ## Contexte projet
            - Rust 2021, dépendances clés : russh 0.54.6 (features=aws-lc-rs), dashmap 6, tokio, clap 4
            - aws-lc-rs requiert cmake + clang + nasm → déjà installés dans ce runner
            - Modules v0.6.0 : ssh/pool.rs (ConnectionPool), core/grep.rs (GrepExecutor)

            ## Ta procédure
            1. Lis les logs et identifie la vraie cause racine
            2. Classe le problème :
               - **Compilation** (erreur rustc, type manquant, import incorrect) → tente un fix + ouvre une PR
               - **Test en échec** (assertion, panic) → ouvre une issue avec analyse complète
               - **Flaky test** (timeout, race condition) → laisse un commentaire sur le run, pas d'issue
               - **fmt/clippy uniquement** → ne fais rien (géré par auto-fix)
            3. Pour une PR de fix :
               - Crée une branche `bot/fix-<description-courte>-<sha[:7]>`
               - Applique le fix minimal
               - Ouvre une PR avec description claire de la cause + du fix
               - Ne merge JAMAIS, ne pousse JAMAIS sur main
            4. Pour une issue :
               - Titre : `[CI] <job> échec — <cause courte>`
               - Corps : logs pertinents + analyse + piste de fix suggérée
               - Label : `bug`

          allowed_tools: "Bash,Read,Write,Edit,mcp__github__create_issue,mcp__github__create_pull_request,mcp__github__push_files"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
