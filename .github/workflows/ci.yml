name: CI

on:
  push:
    branches-ignore: [gh-pages]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # ÉTAPE 1 — Auto-fix fmt + clippy, puis commit si nécessaire
  # Si un fix est commité, le job suivant (quality) sera déclenché à nouveau
  # sur le nouveau SHA propre.
  # ═══════════════════════════════════════════════════════════════════════════
  auto-fix:
    name: 🔧 Auto-fix (fmt + clippy)
    runs-on: ubuntu-latest
    # Seulement sur les push (pas les PRs d'autres forks, pas les schedules)
    if: github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          # Token avec write pour pouvoir pousser le fix
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: System deps (aws-lc-rs)
        run: sudo apt-get update -q && sudo apt-get install -y cmake clang nasm

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # ── cargo fmt ──────────────────────────────────────────────────────────
      - name: 🎨 cargo fmt (auto-fix)
        run: cargo fmt --all

      # ── cargo clippy --fix ─────────────────────────────────────────────────
      # --allow-dirty : ok car on est dans un workdir git propre post-checkout
      # --allow-staged : au cas où fmt a stagé des changements
      - name: 🔍 cargo clippy --fix
        run: |
          cargo clippy --all-targets --all-features --fix --allow-dirty --allow-staged 2>&1 || true
          # --fix ne couvre pas tous les lints → on vérifie quand même en mode strict après
          cargo clippy --all-targets --all-features -- -D warnings

      # ── Commit + push si des fichiers ont changé ───────────────────────────
      - name: 📤 Commit auto-fix si nécessaire
        run: |
          git config user.name  "xsshend-bot"
          git config user.email "bot@xsshend.ci"
          git diff --quiet && git diff --cached --quiet && {
            echo "✅ Aucun changement — code déjà propre"
            exit 0
          }
          git add -A
          git commit -m "style: auto-fix fmt + clippy [skip agent]"
          git push

  # ═══════════════════════════════════════════════════════════════════════════
  # ÉTAPE 2 — Quality gate complet (tests, build, audit)
  # Ne tourne PAS si auto-fix vient de pousser un commit (le push déclenche
  # un nouveau run de CI sur le SHA propre — inutile de dupliquer)
  # ═══════════════════════════════════════════════════════════════════════════
  quality:
    name: 🧪 Tests → Build → Audit
    runs-on: ubuntu-latest
    # Sur push : attendre que auto-fix ait fini (succès ou skip)
    # Sur PR : pas d'auto-fix, on vérifie directement
    needs: [auto-fix]
    if: |
      always() &&
      (needs.auto-fix.result == 'success' || needs.auto-fix.result == 'skipped')

    steps:
      - uses: actions/checkout@v4
        with:
          # Si auto-fix a commité, récupérer le SHA propre
          ref: ${{ github.ref }}

      - name: System deps (aws-lc-rs)
        run: sudo apt-get update -q && sudo apt-get install -y cmake clang nasm

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # Vérification finale (le auto-fix devrait garantir que ça passe)
      - name: 🎨 Vérification fmt
        run: cargo fmt --all -- --check

      - name: 🔍 Vérification clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: 🧪 Tests
        run: cargo test --verbose --all-features

      - name: 🏗️ Build release
        run: cargo build --release --verbose

      - name: 📚 Docs
        run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings

      - name: 🔒 Security audit
        run: |
          cargo install cargo-deny --locked
          cargo deny check

  # ═══════════════════════════════════════════════════════════════════════════
  # ÉTAPE 3 — Build cross-platform (ubuntu + macos)
  # Seulement sur main et PRs, après quality
  # ═══════════════════════════════════════════════════════════════════════════
  build-matrix:
    name: 🏗️ Cross-build (${{ matrix.os }})
    needs: [quality]
    runs-on: ${{ matrix.os }}
    if: |
      needs.quality.result == 'success' &&
      (github.ref == 'refs/heads/main' || github.event_name == 'pull_request')
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: System deps — Linux
        if: runner.os == 'Linux'
        run: sudo apt-get update -q && sudo apt-get install -y cmake clang nasm

      - name: System deps — macOS
        if: runner.os == 'macOS'
        run: brew install cmake

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - run: cargo build --release --verbose
      - run: ./target/release/xsshend --help
