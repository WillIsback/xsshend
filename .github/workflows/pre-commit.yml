name: Pre-commit Quality Gate

on:
  push:
    branches-ignore: ['gh-pages']
  pull_request:

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Quality Gate (Format → Lint → Test → Build)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # aws-lc-rs requiert cmake + clang (dépendance de russh avec features = ["aws-lc-rs"])
      - name: Install build dependencies (aws-lc-rs)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake clang nasm

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: 🎨 Format code
        run: cargo fmt --all

      - name: Check for formatting changes
        id: format-changes
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "changes=true" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi

      - name: 🔍 Clippy (strict)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: 🧪 Tests
        run: cargo test --verbose --all-features

      - name: 🏗️ Release build
        run: cargo build --release --verbose

      - name: 📚 Documentation
        run: cargo doc --no-deps --all-features --document-private-items
        env:
          RUSTDOCFLAGS: "-D warnings"

      - name: 🔄 Auto-commit formatting (main only)
        if: steps.format-changes.outputs.changes == 'true' && github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git commit -m "style: auto-format [skip ci]" || exit 0

      - name: 🚀 Push formatting changes
        if: steps.format-changes.outputs.changes == 'true' && github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}

      - name: ✅ Summary
        run: |
          echo "✅ Format: OK"
          echo "✅ Clippy: OK"
          echo "✅ Tests: OK"
          echo "✅ Build: OK"
          echo "✅ Docs: OK"

      - name: ❌ On failure
        if: failure()
        run: |
          echo "::error::Quality gate failed — run locally: cargo fmt && cargo clippy -- -D warnings && cargo test"
          exit 1

  performance-check:
    name: Performance Regression Check
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies (aws-lc-rs)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake clang nasm

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-bench-${{ hashFiles('**/Cargo.lock') }}

      - name: 🏃 Benchmarks
        run: cargo bench --verbose || echo "::warning::Benchmarks completed with warnings"
        continue-on-error: true
