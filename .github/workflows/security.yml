name: Security Audit

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 9 * * 1'

jobs:
  security-audit:
    name: Security Audit (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # aws-lc-rs requis pour compiler les crates avant l'audit
      - name: Install build dependencies (aws-lc-rs)
        run: sudo apt-get update -q && sudo apt-get install -y cmake clang nasm

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Run cargo-deny (advisories + licenses + bans)
        run: cargo deny check

      - name: Upload advisory report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-advisory-report
          path: |
            deny.toml
            audit.toml

  cargo-audit:
    name: Dependency Audit (cargo-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo-audit
        # RUSTSEC-2023-0071 : mitigé via aws-lc-rs backend (voir deny.toml pour analyse)
        run: cargo audit --ignore RUSTSEC-2023-0071
