name: Release

on:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write
  pages: write
  id-token: write
  actions: write

jobs:
  pre-release-checks:
    name: Pre-release Consistency Checks
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version-check.outputs.version }}
      tag: ${{ steps.version-check.outputs.tag }}
      is-consistent: ${{ steps.version-check.outputs.is-consistent }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Version consistency check
        id: version-check
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const tag = context.ref.replace('refs/tags/', '');
            const expectedVersion = tag.startsWith('v') ? tag.slice(1) : tag;

            const cargoToml = fs.readFileSync('Cargo.toml', 'utf8');
            const cargoVersion = (cargoToml.match(/^version\s*=\s*"([^"]+)"/m) || [])[1];

            const errors = [];
            if (cargoVersion !== expectedVersion) errors.push(`Cargo.toml (${cargoVersion}) ≠ tag (${expectedVersion})`);

            const ok = errors.length === 0;
            if (!ok) { errors.forEach(e => console.log('❌', e)); core.setFailed('Version mismatch'); }
            else console.log(`✅ Version consistent: ${expectedVersion}`);

            core.setOutput('version', expectedVersion);
            core.setOutput('tag', tag);
            core.setOutput('is-consistent', ok.toString());

  test:
    name: Full test suite
    runs-on: ubuntu-latest
    needs: pre-release-checks
    if: needs.pre-release-checks.outputs.is-consistent == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies (aws-lc-rs)
        run: sudo apt-get update -q && sudo apt-get install -y cmake clang nasm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-release-cargo-${{ hashFiles('**/Cargo.lock') }}

      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --verbose
      - run: cargo build --release --verbose
      - run: ./target/release/xsshend --version && ./target/release/xsshend --help

  build:
    name: Build Release Binary
    runs-on: ubuntu-latest
    needs: [pre-release-checks, test]
    if: needs.pre-release-checks.outputs.is-consistent == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies (aws-lc-rs)
        run: sudo apt-get update -q && sudo apt-get install -y cmake clang nasm

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ${{ runner.os }}-release-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release
        run: cargo build --release --verbose

      - name: Package binary
        run: |
          VERSION=${{ needs.pre-release-checks.outputs.version }}
          ARCHIVE="xsshend-${VERSION}-linux-x64.tar.gz"
          tar czf "${ARCHIVE}" -C target/release xsshend
          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV
          sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: release-binary
          path: |
            *.tar.gz
            *.sha256

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [pre-release-checks, build]
    if: needs.pre-release-checks.outputs.is-consistent == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies (aws-lc-rs)
        run: sudo apt-get update -q && sudo apt-get install -y cmake clang nasm

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/
            ~/.cargo/git/
            target/
          key: ubuntu-publish-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          echo "Publishing xsshend ${{ needs.pre-release-checks.outputs.version }}"
          # Dry-run d'abord pour détecter les erreurs
          cargo publish --dry-run || echo "::warning::Dry-run failed — token peut-être révoqué"
          cargo publish --verbose
        continue-on-error: true  # Token potentiellement révoqué — ne pas bloquer la release GitHub

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [pre-release-checks, build, publish]
    if: needs.pre-release-checks.outputs.is-consistent == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare assets
        run: |
          mkdir -p release-assets/
          find artifacts/ -type f | xargs -I{} cp {} release-assets/ || true
          ls -la release-assets/

      - name: Extract changelog entry
        id: changelog
        run: |
          VERSION=${{ needs.pre-release-checks.outputs.version }}
          # Extraire la section de la version dans CHANGELOG.md
          NOTES=$(awk "/^## \[?v?${VERSION}\]?/,/^## \[?v?[0-9]/" CHANGELOG.md 2>/dev/null | head -n -1 || echo "")
          if [ -z "$NOTES" ]; then
            NOTES="Release v${VERSION} — see CHANGELOG.md for details."
          fi
          # Écrire dans un fichier pour éviter les problèmes d'échappement
          echo "$NOTES" > release_notes.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.pre-release-checks.outputs.tag }}
          name: xsshend ${{ needs.pre-release-checks.outputs.version }}
          body_path: release_notes.txt
          draft: false
          prerelease: false
          files: release-assets/*
          token: ${{ secrets.GITHUB_TOKEN }}

  cleanup:
    name: Cleanup artifacts
    runs-on: ubuntu-latest
    needs: [release]
    if: always()
    permissions:
      actions: write
    steps:
      - uses: geekyeggo/delete-artifact@v4
        with:
          name: release-binary
        continue-on-error: true
